<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find The Markers Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800&display=swap" rel="stylesheet">

<!-- Performance warmup -->
<link rel="preconnect" href="https://find-the-markers-roblox.fandom.com">
<link rel="preconnect" href="https://www.roblox.com">

<link rel="prefetch" href="https://www.roblox.com/games/7896264844/Find-the-Markers#!/game-instances">
<link rel="prefetch" href="https://find-the-markers-roblox.fandom.com/wiki/Find_The_Markers_Wiki">
<link rel="prefetch" href="https://find-the-markers-roblox.fandom.com/wiki/Markers">
<link rel="prefetch" href="https://find-the-markers-roblox.fandom.com/wiki/Biomes">

<style>
body {
    margin: 0;
    font-family: "Inter", sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #1e293b, #020617);
    color: #e5e7eb;
    text-align: center;
}

h1 {
    font-size: 46px;
    margin: 0;
    background: linear-gradient(135deg,#3b82f6,#22c55e);
    -webkit-background-clip: text;
    color: transparent;
}

p {
    color: #9ca3af;
    margin-top: 10px;
}

/* Launch button */
.launch {
    margin-top: 40px;
    padding: 32px 80px;
    font-size: 28px;
    font-weight: 800;
    border: none;
    border-radius: 22px;
    cursor: pointer;
    color: white;
    background: linear-gradient(135deg,#3b82f6,#22c55e);
    box-shadow: 0 25px 70px rgba(0,0,0,0.6);
    transition: 0.25s;
    animation: pulse 2.5s infinite;
}

.launch:hover {
    transform: scale(1.08);
    box-shadow: 0 35px 90px rgba(0,0,0,0.8);
}

@keyframes pulse {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.15); }
}
</style>
</head>

<body>

<h1>Find The Markers</h1>
<p>One click launches everything</p>

<button class="launch" onclick="openAll()">🚀 Launch Everything</button>

<script>
function openAll() {
    const links = [
        "https://www.roblox.com/games/7896264844/Find-the-Markers#!/game-instances",
        "https://find-the-markers-roblox.fandom.com/wiki/Find_The_Markers_Wiki",
        "https://find-the-markers-roblox.fandom.com/wiki/Markers",
        "https://find-the-markers-roblox.fandom.com/wiki/Biomes"
    ];

    let i = 0;

    function openNext() {
        if (i >= links.length) return;

        const win = window.open(links[i], "_blank");

        if (!win) {
            alert("Popup blocked — please allow popups for this site and try again.");
            return;
        }

        i++;
        setTimeout(openNext, 450); // stagger = higher success rate
    }

    openNext();
}
</script>

</body>
</html>
